<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa dos Cinéfilos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Arial', sans-serif;
            background: #141414;
            color: #fff;
        }

        /* NAVBAR */
        nav {
            background: linear-gradient(to bottom, #000 0%, transparent 100%);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        nav h1 {
            color: #e50914;
            font-size: 1.8em;
            font-weight: bold;
            cursor: pointer;
        }

        .nav-links { display: flex; gap: 20px; }

        .nav-links button {
            background: none;
            border: none;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .nav-links button:hover, .nav-links button.active {
            background: #e50914;
        }

        .search-bar {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }

        .search-bar input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 8px 15px;
            border-radius: 20px;
            width: 250px;
            font-size: 0.9em;
        }

        .search-bar input::placeholder { color: rgba(255,255,255,0.5); }

        .search-bar button {
            background: #e50914;
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* HERO */
        .hero {
            height: 500px;
            background: linear-gradient(to right, #000 30%, transparent),
                        linear-gradient(to top, #141414 0%, transparent 50%),
                        url('https://image.tmdb.org/t/p/original/') center/cover;
            display: flex;
            align-items: center;
            padding: 0 40px;
            margin-top: 60px;
        }

        /* SECTIONS */
        .section {
            padding: 20px 40px;
            display: none;
        }

        .section.active { display: block; }

        .section h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #fff;
            border-left: 4px solid #e50914;
            padding-left: 10px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        /* CARD */
        .card {
            background: #1f1f1f;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(229, 9, 20, 0.4);
        }

        .card img {
            width: 100%;
            height: 270px;
            object-fit: cover;
        }

        .card-info { padding: 10px; }

        .card-title {
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-date { font-size: 0.75em; color: #aaa; }

        .stars { color: #f5c518; font-size: 0.8em; margin-top: 5px; }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: #1f1f1f;
            border-radius: 12px;
            width: 700px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-banner {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 12px 12px 0 0;
        }

        .modal-body { padding: 25px; }

        .modal-body h2 { font-size: 1.8em; margin-bottom: 10px; }

        .modal-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 0.85em;
            color: #aaa;
        }

        .modal-meta span { color: #f5c518; }

        .modal-overview {
            line-height: 1.6;
            color: #ccc;
            margin-bottom: 20px;
        }

        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            background: rgba(0,0,0,0.7);
            border: none;
            color: #fff;
            width: 35px; height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
        }

        /* RATING */
        .rating-section { margin-top: 15px; }
        .rating-section h4 { margin-bottom: 10px; color: #fff; }

        .star-rating { display: flex; gap: 5px; margin-bottom: 10px; }

        .star-rating span {
            font-size: 2em;
            cursor: pointer;
            color: #555;
            transition: color 0.2s;
        }

        .star-rating span.active { color: #f5c518; }

        /* TABS */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #2a2a2a;
            border: none;
            color: #aaa;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn:hover, .tab-btn.active {
            background: #e50914;
            color: #fff;
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 50px;
            color: #aaa;
            font-size: 1.2em;
        }

        /* BADGE */
        .badge {
            position: absolute;
            top: 10px; right: 10px;
            background: #e50914;
            color: #fff;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.7em;
            font-weight: bold;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #141414; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 3px; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <h1 onclick="showSection('home')">🎬 Casa dos Cinéfilos</h1>
    <div class="nav-links">
        <button class="active" onclick="showSection('home')">Início</button>
        <button onclick="showSection('filmes')">Filmes</button>
        <button onclick="showSection('series')">Séries</button>
        <button onclick="showSection('em-breve')">Em Breve</button>
    </div>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar filmes e séries..." 
               onkeypress="if(event.key==='Enter') buscar()">
        <button onclick="buscar()">Buscar</button>
    </div>
</nav>

<!-- SECTIONS -->
<div id="home" class="section active" style="padding-top: 80px;">
    <h2>🔥 Tendências</h2>
    <div class="tabs">
        <button class="tab-btn active" onclick="carregarTendencias('all')">Tudo</button>
        <button class="tab-btn" onclick="carregarTendencias('movie')">Filmes</button>
        <button class="tab-btn" onclick="carregarTendencias('tv')">Séries</button>
    </div>
    <div class="grid" id="tendencias-grid">
        <div class="loading">Carregando...</div>
    </div>

    <h2 style="margin-top: 40px;">⭐ Mais Bem Avaliados</h2>
    <div class="grid" id="top-grid">
        <div class="loading">Carregando...</div>
    </div>
</div>

<div id="filmes" class="section" style="padding-top: 80px;">
    <h2>🎬 Filmes Populares</h2>
    <div class="tabs" id="generos-filmes"></div>
    <div class="grid" id="filmes-grid">
        <div class="loading">Carregando...</div>
    </div>
</div>

<div id="series" class="section" style="padding-top: 80px;">
    <h2>📺 Séries Populares</h2>
    <div class="tabs" id="generos-series"></div>
    <div class="grid" id="series-grid">
        <div class="loading">Carregando...</div>
    </div>
</div>

<div id="em-breve" class="section" style="padding-top: 80px;">
    <h2>🗓️ Em Breve nos Cinemas</h2>
    <div class="grid" id="embreve-grid">
        <div class="loading">Carregando...</div>
    </div>
</div>

<div id="busca" class="section" style="padding-top: 80px;">
    <h2>🔍 Resultados da Busca</h2>
    <div class="grid" id="busca-grid">
        <div class="loading">Buscando...</div>
    </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="fecharModal(event)">
    <div class="modal" id="modal">
        <button class="modal-close" onclick="fecharModal()">✕</button>
        <img id="modal-banner" class="modal-banner" src="" alt="">
        <div class="modal-body">
            <h2 id="modal-title"></h2>
            <div class="modal-meta">
                <span id="modal-rating">⭐</span>
                <span id="modal-date"></span>
                <span id="modal-type"></span>
            </div>
            <p class="modal-overview" id="modal-overview"></p>
            <div class="rating-section">
                <h4>Sua avaliação:</h4>
                <div class="star-rating" id="starRating">
                    <span onclick="avaliar(1)">★</span>
                    <span onclick="avaliar(2)">★</span>
                    <span onclick="avaliar(3)">★</span>
                    <span onclick="avaliar(4)">★</span>
                    <span onclick="avaliar(5)">★</span>
                </div>
                <p id="avaliacaoMsg" style="color:#aaa; font-size:0.85em;"></p>
            </div>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'add4acf69f7d6a6cd5ba7278914fb58a';
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMG_URL = 'https://image.tmdb.org/t/p/w500';
    const BANNER_URL = 'https://image.tmdb.org/t/p/w1280';
    const LANG = 'pt-BR';

    let avaliacoes = JSON.parse(localStorage.getItem('avaliacoes') || '{}');
    let itemAtual = null;

    // ========== NAVEGAÇÃO ==========
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');

        if (id === 'home') { carregarTendencias('all'); carregarTop(); }
        if (id === 'filmes') carregarFilmes();
        if (id === 'series') carregarSeries();
        if (id === 'em-breve') carregarEmBreve();
    }

    // ========== FETCH ==========
    async function fetchAPI(endpoint) {
        const res = await fetch(`${BASE_URL}${endpoint}&api_key=${API_KEY}&language=${LANG}`);
        return res.json();
    }

    // ========== CARD ==========
    function criarCard(item, tipo) {
        const titulo = item.title || item.name;
        const data = item.release_date || item.first_air_date || '';
        const ano = data ? data.substring(0, 4) : 'N/A';
        const poster = item.poster_path ? `${IMG_URL}${item.poster_path}` : 'https://via.placeholder.com/180x270/1f1f1f/aaa?text=Sem+Poster';
        const nota = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
        const stars = notaParaStars(nota);
        const minhaAvaliacao = avaliacoes[item.id] ? `⭐ Minha nota: ${avaliacoes[item.id]}/5` : '';
        const badge = tipo === 'movie' ? 'FILME' : 'SÉRIE';

        return `
            <div class="card" onclick="abrirModal(${item.id}, '${tipo}')">
                <span class="badge">${badge}</span>
                <img src="${poster}" alt="${titulo}" loading="lazy">
                <div class="card-info">
                    <div class="card-title">${titulo}</div>
                    <div class="card-date">${ano}</div>
                    <div class="stars">${stars} ${nota}</div>
                    ${minhaAvaliacao ? `<div style="font-size:0.75em;color:#f5c518;margin-top:3px;">${minhaAvaliacao}</div>` : ''}
                </div>
            </div>
        `;
    }

    function notaParaStars(nota) {
        const n = parseFloat(nota);
        if (isNaN(n)) return '☆☆☆☆☆';
        const estrelas = Math.round(n / 2);
        return '★'.repeat(estrelas) + '☆'.repeat(5 - estrelas);
    }

    // ========== TENDÊNCIAS ==========
    async function carregarTendencias(tipo) {
        document.querySelectorAll('.tabs .tab-btn').forEach(b => b.classList.remove('active'));
        event?.target?.classList.add('active');
        document.getElementById('tendencias-grid').innerHTML = '<div class="loading">Carregando...</div>';
        const data = await fetchAPI(`/trending/${tipo}/week?`);
        document.getElementById('tendencias-grid').innerHTML = 
            data.results.map(i => criarCard(i, i.media_type || tipo)).join('');
    }

    // ========== TOP RATED ==========
    async function carregarTop() {
        const data = await fetchAPI('/movie/top_rated?');
        document.getElementById('top-grid').innerHTML = 
            data.results.slice(0, 12).map(i => criarCard(i, 'movie')).join('');
    }

    // ========== FILMES ==========
    async function carregarFilmes(genero = '') {
        document.getElementById('filmes-grid').innerHTML = '<div class="loading">Carregando...</div>';
        const endpoint = genero ? `/discover/movie?with_genres=${genero}&` : '/movie/popular?';
        const data = await fetchAPI(endpoint);
        document.getElementById('filmes-grid').innerHTML = 
            data.results.map(i => criarCard(i, 'movie')).join('');

        if (!genero) carregarGenerosFilmes();
    }

    async function carregarGenerosFilmes() {
        const data = await fetchAPI('/genre/movie/list?');
        const html = `<button class="tab-btn active" onclick="carregarFilmes()">Todos</button>` +
            data.genres.slice(0, 8).map(g => 
                `<button class="tab-btn" onclick="carregarFilmes(${g.id})">${g.name}</button>`
            ).join('');
        document.getElementById('generos-filmes').innerHTML = html;
    }

    // ========== SÉRIES ==========
    async function carregarSeries(genero = '') {
        document.getElementById('series-grid').innerHTML = '<div class="loading">Carregando...</div>';
        const endpoint = genero ? `/discover/tv?with_genres=${genero}&` : '/tv/popular?';
        const data = await fetchAPI(endpoint);
        document.getElementById('series-grid').innerHTML = 
            data.results.map(i => criarCard(i, 'tv')).join('');

        if (!genero) carregarGenerosSeries();
    }

    async function carregarGenerosSeries() {
        const data = await fetchAPI('/genre/tv/list?');
        const html = `<button class="tab-btn active" onclick="carregarSeries()">Todos</button>` +
            data.genres.slice(0, 8).map(g => 
                `<button class="tab-btn" onclick="carregarSeries(${g.id})">${g.name}</button>`
            ).join('');
        document.getElementById('generos-series').innerHTML = html;
    }

    // ========== EM BREVE ==========
    async function carregarEmBreve() {
        document.getElementById('embreve-grid').innerHTML = '<div class="loading">Carregando...</div>';
        const data = await fetchAPI('/movie/upcoming?');
        document.getElementById('embreve-grid').innerHTML = 
            data.results.map(i => criarCard(i, 'movie')).join('');
    }

    // ========== BUSCA ==========
    async function buscar() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) return;
        showSection('busca');
        document.getElementById('busca-grid').innerHTML = '<div class="loading">Buscando...</div>';
        const data = await fetchAPI(`/search/multi?query=${encodeURIComponent(query)}&`);
        const resultados = data.results.filter(i => i.media_type !== 'person');
        document.getElementById('busca-grid').innerHTML = resultados.length > 0
            ? resultados.map(i => criarCard(i, i.media_type)).join('')
            : '<div class="loading">Nenhum resultado encontrado.</div>';
    }

    // ========== MODAL ==========
    async function abrirModal(id, tipo) {
        itemAtual = { id, tipo };
        const endpoint = tipo === 'movie' ? `/movie/${id}?` : `/tv/${id}?`;
        const data = await fetchAPI(endpoint);

        const titulo = data.title || data.name;
        const banner = data.backdrop_path ? `${BANNER_URL}${data.backdrop_path}` : 
                       data.poster_path ? `${IMG_URL}${data.poster_path}` : '';
        const overview = data.overview || 'Sinopse não disponível.';
        const nota = data.vote_average ? data.vote_average.toFixed(1) : 'N/A';
        const data_lancamento = data.release_date || data.first_air_date || 'N/A';
        const tipoLabel = tipo === 'movie' ? '🎬 Filme' : '📺 Série';

        document.getElementById('modal-banner').src = banner;
        document.getElementById('modal-title').textContent = titulo;
        document.getElementById('modal-rating').textContent = `⭐ ${nota}/10`;
        document.getElementById('modal-date').textContent = `📅 ${data_lancamento}`;
        document.getElementById('modal-type').textContent = tipoLabel;
        document.getElementById('modal-overview').textContent = overview;

        // Mostra avaliação salva
        const minhaAvaliacao = avaliacoes[id];
        atualizarStars(minhaAvaliacao || 0);
        document.getElementById('avaliacaoMsg').textContent = minhaAvaliacao 
            ? `Você avaliou com ${minhaAvaliacao} estrela(s)` : 'Clique nas estrelas para avaliar';

        document.getElementById('modalOverlay').classList.add('show');
    }

    function fecharModal(event) {
        if (!event || event.target === document.getElementById('modalOverlay')) {
            document.getElementById('modalOverlay').classList.remove('show');
        }
    }

    // ========== AVALIAÇÃO ==========
    function avaliar(nota) {
        if (!itemAtual) return;
        avaliacoes[itemAtual.id] = nota;
        localStorage.setItem('avaliacoes', JSON.stringify(avaliacoes));
        atualizarStars(nota);
        document.getElementById('avaliacaoMsg').textContent = `Você avaliou com ${nota} estrela(s) ⭐`;
    }

    function atualizarStars(nota) {
        document.querySelectorAll('#starRating span').forEach((s, i) => {
            s.classList.toggle('active', i < nota);
        });
    }

    // ========== INIT ==========
    carregarTendencias('all');
    carregarTop();
</script>
</body>
</html>
