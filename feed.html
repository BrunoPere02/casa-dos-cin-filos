<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed — Casa dos Cinéfilos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: #141414; color: #fff; }

        nav {
            background: rgba(0,0,0,0.95);
            padding: 15px 40px;
            display: flex; align-items: center; gap: 20px;
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }
        nav h1 { color: #e50914; font-size: 1.5em; font-weight: bold; cursor: pointer; }
        .nav-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
        .nav-btn {
            background: none; border: 1px solid #555; color: #fff;
            padding: 7px 15px; border-radius: 20px; cursor: pointer; transition: all 0.3s;
        }
        .nav-btn:hover { border-color: #e50914; color: #e50914; }
        .nav-avatar {
            width: 35px; height: 35px; border-radius: 50%;
            border: 2px solid #e50914; cursor: pointer; object-fit: cover;
        }

        .layout {
            max-width: 1100px; margin: 0 auto;
            padding: 80px 20px 40px;
            display: grid; grid-template-columns: 1fr 340px; gap: 30px;
        }

        .feed-header { margin-bottom: 20px; }
        .feed-header h2 { font-size: 1.3em; border-left: 4px solid #e50914; padding-left: 10px; }

        .feed-tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .feed-tab {
            background: #2a2a2a; border: none; color: #aaa;
            padding: 8px 18px; border-radius: 20px; cursor: pointer; transition: all 0.3s;
        }
        .feed-tab.active, .feed-tab:hover { background: #e50914; color: #fff; }

        /* CARD RESENHA */
        .resenha-card {
            background: #1f1f1f; border-radius: 12px;
            padding: 20px; margin-bottom: 15px;
            transition: box-shadow 0.2s;
        }
        .resenha-card:hover { box-shadow: 0 4px 20px rgba(229,9,20,0.15); }

        .resenha-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .resenha-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            object-fit: cover; cursor: pointer; border: 2px solid #333;
        }
        .resenha-avatar:hover { border-color: #e50914; }
        .resenha-user-nome { font-weight: bold; cursor: pointer; }
        .resenha-user-nome:hover { color: #e50914; }
        .resenha-data { font-size: 0.75em; color: #aaa; }

        /* Filme clicável */
        .resenha-filme {
            display: flex; gap: 12px; margin-bottom: 12px;
            background: #2a2a2a; border-radius: 8px; padding: 10px;
            cursor: pointer; transition: all 0.2s;
            border: 1px solid transparent;
        }
        .resenha-filme:hover {
            background: #333;
            border-color: #e50914;
            transform: translateX(3px);
        }
        .resenha-filme-arrow {
            margin-left: auto; color: #e50914; font-size: 1.2em;
            align-self: center; opacity: 0; transition: opacity 0.2s;
        }
        .resenha-filme:hover .resenha-filme-arrow { opacity: 1; }

        .resenha-poster { width: 45px; height: 65px; border-radius: 5px; object-fit: cover; }
        .resenha-filme-titulo { font-weight: bold; font-size: 0.9em; }
        .resenha-filme-ano { font-size: 0.75em; color: #aaa; }
        .resenha-estrelas { color: #f5c518; font-size: 0.9em; margin-top: 3px; }
        .resenha-texto { line-height: 1.6; color: #ddd; margin-bottom: 15px; }

        /* AÇÕES */
        .resenha-acoes {
            display: flex; gap: 20px; padding-top: 12px;
            border-top: 1px solid #2a2a2a; align-items: center;
        }

        /* REAÇÕES */
        .reacao-wrap { position: relative; display: inline-flex; align-items: center; }

        .reacao-btn {
            background: none; border: none; color: #aaa;
            cursor: pointer; font-size: 0.95em;
            display: flex; align-items: center; gap: 5px;
            padding: 4px 8px; border-radius: 8px; transition: all 0.2s;
        }
        .reacao-btn:hover { background: #2a2a2a; color: #fff; }
        .reacao-btn.reagido { background: #2a2a2a; }

        /* Menu de reações flutuante */
        .reacoes-menu {
            position: absolute; bottom: calc(100% + 8px); left: 0;
            background: #2a2a2a; border: 1px solid #444;
            border-radius: 30px; padding: 6px 10px;
            display: flex; gap: 4px;
            opacity: 0; pointer-events: none;
            transform: scale(0.8) translateY(10px);
            transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
            z-index: 100; white-space: nowrap;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .reacao-wrap:hover .reacoes-menu,
        .reacoes-menu:hover {
            opacity: 1; pointer-events: all;
            transform: scale(1) translateY(0);
        }

        .reacao-op {
            font-size: 1.6em; cursor: pointer;
            transition: transform 0.15s; border-radius: 50%;
            padding: 4px; display: flex; align-items: center; justify-content: center;
        }
        .reacao-op:hover { transform: scale(1.4) translateY(-4px); }

        .reacao-op-tooltip {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .reacao-op-label {
            font-size: 0.55em; color: #fff; background: #000;
            padding: 2px 6px; border-radius: 8px; white-space: nowrap;
            opacity: 0; transition: opacity 0.15s; pointer-events: none;
            position: absolute; bottom: calc(100% + 2px);
        }
        .reacao-op:hover .reacao-op-label { opacity: 1; }

        /* Contadores de reações */
        .reacoes-contadores {
            display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
        }
        .reacao-count {
            background: #2a2a2a; border-radius: 12px;
            padding: 2px 8px; font-size: 0.82em;
            display: flex; align-items: center; gap: 3px;
            cursor: pointer; transition: background 0.2s;
        }
        .reacao-count:hover { background: #333; }
        .reacao-count.minha { border: 1px solid #e50914; }

        .acao-btn {
            background: none; border: none; color: #aaa;
            cursor: pointer; font-size: 0.9em; transition: color 0.2s;
            display: flex; align-items: center; gap: 5px;
            padding: 4px 8px; border-radius: 8px;
        }
        .acao-btn:hover { color: #fff; background: #2a2a2a; }

        /* EMOJI PICKER */
        .comentario-form { display: flex; gap: 8px; margin-top: 10px; position: relative; }
        .comentario-form input {
            flex: 1; background: #2a2a2a; border: 1px solid #444;
            color: #fff; padding: 8px 12px; border-radius: 20px; font-size: 0.9em;
        }
        .comentario-form input:focus { outline: none; border-color: #e50914; }

        .emoji-btn {
            background: #2a2a2a; border: 1px solid #444; color: #fff;
            width: 35px; border-radius: 50%; cursor: pointer; font-size: 1em;
            transition: all 0.2s; flex-shrink: 0;
        }
        .emoji-btn:hover { background: #444; transform: scale(1.1); }

        .emoji-picker {
            position: absolute; bottom: calc(100% + 8px); right: 45px;
            background: #2a2a2a; border: 1px solid #444; border-radius: 12px;
            padding: 10px; display: none; flex-wrap: wrap;
            width: 280px; gap: 4px; z-index: 200;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .emoji-picker.show { display: flex; }

        .emoji-item {
            font-size: 1.4em; cursor: pointer; padding: 4px;
            border-radius: 6px; transition: all 0.15s;
        }
        .emoji-item:hover { background: #444; transform: scale(1.2); }

        .send-btn {
            background: #e50914; border: none; color: #fff;
            width: 35px; border-radius: 50%; cursor: pointer; font-size: 1em;
            transition: all 0.2s; flex-shrink: 0;
        }
        .send-btn:hover { background: #b00610; }

        /* Comentários */
        .comentarios-wrap { margin-top: 15px; display: none; }
        .comentarios-wrap.show { display: block; }

        .comentario {
            display: flex; gap: 10px; margin-bottom: 10px;
            padding: 10px; background: #2a2a2a; border-radius: 8px;
        }
        .com-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
        .com-nome { font-weight: bold; font-size: 0.85em; margin-bottom: 2px; }
        .com-texto { font-size: 0.85em; color: #ccc; }

        /* SIDEBAR */
        .sidebar-card {
            background: #1f1f1f; border-radius: 12px; padding: 20px; margin-bottom: 20px;
        }
        .sidebar-card h3 { font-size: 1em; margin-bottom: 15px; color: #e50914; }

        .busca-filme-input {
            width: 100%; background: #2a2a2a; border: 1px solid #444;
            color: #fff; padding: 10px 12px; border-radius: 8px;
            font-size: 0.9em; margin-bottom: 10px;
        }
        .busca-filme-input:focus { outline: none; border-color: #e50914; }

        .busca-resultado {
            background: #2a2a2a; border-radius: 8px; overflow: hidden;
            max-height: 200px; overflow-y: auto; margin-bottom: 10px;
        }
        .busca-item {
            display: flex; gap: 10px; padding: 8px 12px;
            cursor: pointer; transition: background 0.2s; align-items: center;
        }
        .busca-item:hover { background: #333; }
        .busca-item img { width: 30px; height: 45px; object-fit: cover; border-radius: 3px; }
        .busca-item-titulo { font-size: 0.85em; font-weight: bold; }
        .busca-item-ano { font-size: 0.75em; color: #aaa; }

        .filme-selecionado {
            display: none; background: #2a2a2a; border-radius: 8px;
            padding: 10px; margin-bottom: 10px; align-items: center; gap: 10px;
        }
        .filme-selecionado.show { display: flex; }
        .filme-selecionado img { width: 35px; height: 50px; object-fit: cover; border-radius: 3px; }

        .nota-select { display: flex; gap: 5px; margin-bottom: 10px; }
        .nota-star { font-size: 1.8em; cursor: pointer; color: #555; transition: color 0.2s; }
        .nota-star.ativo { color: #f5c518; }

        .resenha-textarea {
            width: 100%; background: #2a2a2a; border: 1px solid #444;
            color: #fff; padding: 10px 12px; border-radius: 8px;
            font-size: 0.9em; height: 100px; resize: none; margin-bottom: 10px;
            font-family: Arial;
        }
        .resenha-textarea:focus { outline: none; border-color: #e50914; }

        .btn-publicar {
            width: 100%; background: #e50914; border: none; color: #fff;
            padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .btn-publicar:hover { background: #b00610; }
        .btn-publicar:disabled { background: #555; cursor: not-allowed; }

        .usuario-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .usuario-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; cursor: pointer; }
        .usuario-nome { font-size: 0.9em; font-weight: bold; flex: 1; cursor: pointer; }
        .usuario-nome:hover { color: #e50914; }
        .btn-seguir-mini {
            background: none; border: 1px solid #555; color: #aaa;
            padding: 4px 10px; border-radius: 12px; cursor: pointer; font-size: 0.8em;
            transition: all 0.2s;
        }
        .btn-seguir-mini:hover { border-color: #e50914; color: #e50914; }

        .loading { text-align: center; padding: 40px; color: #aaa; }
        .empty-state { text-align: center; padding: 40px; color: #aaa; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #141414; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 3px; }
    </style>
</head>
<body>

<nav>
    <h1 onclick="window.location.href='index.html'">🎬 Casa dos Cinéfilos</h1>
    <div class="nav-right">
        <button class="nav-btn" onclick="window.location.href='index.html'">🎬 Catálogo</button>
        <img class="nav-avatar" id="nav-avatar" src="" onclick="window.location.href='perfil.html'">
        <button class="nav-btn" onclick="sair()">Sair</button>
    </div>
</nav>

<div class="layout">
    <div>
        <div class="feed-header"><h2>📰 Feed</h2></div>
        <div class="feed-tabs">
            <button class="feed-tab active" onclick="trocarFeed('global', this)">🌍 Global</button>
            <button class="feed-tab" onclick="trocarFeed('seguindo', this)">👥 Seguindo</button>
        </div>
        <div id="feed-lista"><div class="loading">Carregando...</div></div>
    </div>

    <div>
        <div class="sidebar-card">
            <h3>✍️ Nova Resenha</h3>
            <input class="busca-filme-input" id="busca-filme" placeholder="Buscar filme ou série..." oninput="buscarFilme()">
            <div class="busca-resultado" id="busca-resultado" style="display:none;"></div>
            <div class="filme-selecionado" id="filme-selecionado">
                <img id="filme-sel-poster" src="" alt="">
                <div>
                    <div id="filme-sel-titulo" style="font-weight:bold;font-size:0.9em;"></div>
                    <div id="filme-sel-ano" style="font-size:0.75em;color:#aaa;"></div>
                </div>
            </div>
            <div class="nota-select" id="nota-select">
                <span class="nota-star" onclick="selecionarNota(1)">★</span>
                <span class="nota-star" onclick="selecionarNota(2)">★</span>
                <span class="nota-star" onclick="selecionarNota(3)">★</span>
                <span class="nota-star" onclick="selecionarNota(4)">★</span>
                <span class="nota-star" onclick="selecionarNota(5)">★</span>
            </div>
            <textarea class="resenha-textarea" id="resenha-texto" placeholder="Escreva sua resenha..."></textarea>
            <button class="btn-publicar" onclick="publicarResenha()" id="btn-publicar">Publicar</button>
        </div>

        <div class="sidebar-card">
            <h3>👥 Cinéfilos para seguir</h3>
            <div id="sugestoes-lista"><div class="loading">Carregando...</div></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, limit, getDocs, addDoc, updateDoc, doc, getDoc, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDS0ZNDyRDiq4xOKTzbeMnIZIdR1dI1q6s",
        authDomain: "casa-dos-cinefilos.firebaseapp.com",
        projectId: "casa-dos-cinefilos",
        storageBucket: "casa-dos-cinefilos.firebasestorage.app",
        messagingSenderId: "77381886629",
        appId: "1:77381886629:web:335bb10ba7cf83b86be34c"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const API_KEY = 'add4acf69f7d6a6cd5ba7278914fb58a';
    const BASE    = 'https://api.themoviedb.org/3';

    // Reações disponíveis
    const REACOES = [
        { key: 'amei',     emoji: '❤️',  label: 'Amei' },
        { key: 'curti',    emoji: '👍',  label: 'Curti' },
        { key: 'haha',     emoji: '😂',  label: 'Hahaha' },
        { key: 'triste',   emoji: '😢',  label: 'Triste' },
        { key: 'nao_gostei', emoji: '👎', label: 'Não gostei' },
    ];

    // Emojis para comentários
    const EMOJIS = ['😂','❤️','🔥','👏','😍','🎬','🎥','⭐','💯','😮','😢','😡','🤔','👀','🙌','💪','🤣','😎','🥹','💀','🫶','✨','🎭','🍿','😱'];

    let usuarioAtual  = null;
    let filmeSelecionado = null;
    let notaSelecionada  = 0;
    let feedAtual = 'global';
    let buscaTimeout = null;

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        usuarioAtual = user;
        document.getElementById('nav-avatar').src = user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`;
        await carregarFeed('global');
        await carregarSugestoes();
    });

    // ===== FEED =====
    window.trocarFeed = async (tipo, btn) => {
        document.querySelectorAll('.feed-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        feedAtual = tipo;
        await carregarFeed(tipo);
    };

    async function carregarFeed(tipo) {
        const lista = document.getElementById('feed-lista');
        lista.innerHTML = '<div class="loading">Carregando...</div>';
        try {
            let q;
            if (tipo === 'global') {
                q = query(collection(db, 'resenhas'), orderBy('criadoEm', 'desc'), limit(30));
            } else {
                const snap = await getDoc(doc(db, 'usuarios', usuarioAtual.uid));
                const seguindo = snap.data()?.seguindo || [];
                if (!seguindo.length) {
                    lista.innerHTML = '<div class="empty-state">Siga outros cinéfilos para ver o feed deles!</div>';
                    return;
                }
                q = query(collection(db, 'resenhas'), where('autorId', 'in', seguindo.slice(0,10)), orderBy('criadoEm', 'desc'), limit(30));
            }
            const snap = await getDocs(q);
            if (snap.empty) { lista.innerHTML = '<div class="empty-state">Nenhuma resenha ainda. Seja o primeiro!</div>'; return; }
            lista.innerHTML = snap.docs.map(d => renderResenha(d.id, d.data())).join('');
        } catch(e) {
            lista.innerHTML = '<div class="empty-state">Erro ao carregar feed.</div>';
        }
    }

    function renderResenha(id, r) {
        const estrelas = '★'.repeat(r.nota || 0) + '☆'.repeat(5 - (r.nota || 0));
        const data = r.criadoEm?.toDate ? r.criadoEm.toDate().toLocaleDateString('pt-BR') : '';
        const reacoes = r.reacoes || {};

        // Monta contadores de reações
        let contadoresHTML = '';
        let minhaReacao = null;
        REACOES.forEach(rx => {
            const lista = reacoes[rx.key] || [];
            if (lista.length > 0) {
                const minha = lista.includes(usuarioAtual?.uid);
                if (minha) minhaReacao = rx;
                contadoresHTML += `<span class="reacao-count ${minha ? 'minha' : ''}" onclick="reagir('${id}','${rx.key}')" title="${rx.label}">
                    ${rx.emoji} ${lista.length}
                </span>`;
            }
        });

        const btnReacaoEmoji = minhaReacao ? minhaReacao.emoji : '❤️';
        const btnReacaoLabel = minhaReacao ? minhaReacao.label : 'Reagir';

        // Link para a página do filme
        const tipoUrl = r.tipoFilme === 'filme' ? 'filme' : 'serie';
        const filmeUrl = `index.html#${tipoUrl}/${r.filmeId}`;

        return `
        <div class="resenha-card" id="res-${id}">
            <div class="resenha-header">
                <img class="resenha-avatar" src="${r.autorAvatar||''}" onclick="window.location.href='perfil.html?uid=${r.autorId}'">
                <div style="flex:1">
                    <div class="resenha-user-nome" onclick="window.location.href='perfil.html?uid=${r.autorId}'">${r.autorNome||''}</div>
                    <div class="resenha-data">${data}</div>
                </div>
            </div>

            <div class="resenha-filme" onclick="window.location.href='${filmeUrl}'">
                <img class="resenha-poster" src="${r.filmePoster ? 'https://image.tmdb.org/t/p/w92'+r.filmePoster : ''}" alt="">
                <div style="flex:1">
                    <div class="resenha-filme-titulo">${r.filmeTitulo||''}</div>
                    <div class="resenha-filme-ano">${r.filmeAno||''}</div>
                    <div class="resenha-estrelas">${estrelas}</div>
                </div>
                <span class="resenha-filme-arrow">→</span>
            </div>

            <p class="resenha-texto">${r.texto||''}</p>

            <div class="resenha-acoes">
                <!-- Botão de reação com menu flutuante -->
                <div class="reacao-wrap">
                    <button class="reacao-btn ${minhaReacao ? 'reagido' : ''}" title="Reagir">
                        ${btnReacaoEmoji} ${btnReacaoLabel}
                    </button>
                    <div class="reacoes-menu">
                        ${REACOES.map(rx => `
                            <div class="reacao-op" onclick="reagir('${id}','${rx.key}')" title="${rx.label}">
                                <div class="reacao-op-tooltip" style="position:relative;">
                                    <span class="reacao-op-label">${rx.label}</span>
                                    ${rx.emoji}
                                </div>
                            </div>`).join('')}
                    </div>
                </div>

                <!-- Contadores -->
                <div class="reacoes-contadores" id="contadores-${id}">
                    ${contadoresHTML}
                </div>

                <button class="acao-btn" onclick="toggleComentarios('${id}')">💬 Comentários</button>
            </div>

            <div class="comentarios-wrap" id="coms-${id}">
                <div id="lista-coms-${id}"></div>
                <div class="comentario-form">
                    <input type="text" placeholder="Comentar..." id="input-com-${id}" onkeypress="if(event.key==='Enter') comentar('${id}')">
                    <button class="emoji-btn" onclick="toggleEmoji('${id}')" title="Emojis">😊</button>
                    <button class="send-btn" onclick="comentar('${id}')">→</button>
                    <div class="emoji-picker" id="emoji-picker-${id}">
                        ${EMOJIS.map(e => `<span class="emoji-item" onclick="inserirEmoji('${id}','${e}')">${e}</span>`).join('')}
                    </div>
                </div>
            </div>
        </div>`;
    }

    // ===== REAÇÕES =====
    window.reagir = async (resId, tipoReacao) => {
        const ref  = doc(db, 'resenhas', resId);
        const snap = await getDoc(ref);
        if (!snap.exists()) return;
        const reacoes = snap.data().reacoes || {};

        // Remove de todas as reações primeiro (só 1 por usuário)
        REACOES.forEach(rx => {
            if (!reacoes[rx.key]) reacoes[rx.key] = [];
            reacoes[rx.key] = reacoes[rx.key].filter(uid => uid !== usuarioAtual.uid);
        });

        // Verifica se já tinha essa reação (toggle)
        const jaReagiu = (snap.data().reacoes?.[tipoReacao] || []).includes(usuarioAtual.uid);
        if (!jaReagiu) reacoes[tipoReacao].push(usuarioAtual.uid);

        await updateDoc(ref, { reacoes });

        // Atualiza os contadores na tela
        const snapAtual = await getDoc(ref);
        const reAtuais  = snapAtual.data().reacoes || {};
        let contHTML = '';
        let minhaReacao = null;
        REACOES.forEach(rx => {
            const lista = reAtuais[rx.key] || [];
            if (lista.length > 0) {
                const minha = lista.includes(usuarioAtual.uid);
                if (minha) minhaReacao = rx;
                contHTML += `<span class="reacao-count ${minha ? 'minha' : ''}" onclick="reagir('${resId}','${rx.key}')" title="${rx.label}">
                    ${rx.emoji} ${lista.length}
                </span>`;
            }
        });
        document.getElementById(`contadores-${resId}`).innerHTML = contHTML;

        // Atualiza botão principal
        const card = document.getElementById(`res-${resId}`);
        const btn  = card?.querySelector('.reacao-btn');
        if (btn) {
            btn.className = `reacao-btn ${minhaReacao ? 'reagido' : ''}`;
            btn.innerHTML = minhaReacao ? `${minhaReacao.emoji} ${minhaReacao.label}` : '❤️ Reagir';
        }
    };

    // ===== EMOJIS =====
    window.toggleEmoji = (id) => {
        const picker = document.getElementById(`emoji-picker-${id}`);
        picker.classList.toggle('show');
    };

    window.inserirEmoji = (id, emoji) => {
        const input = document.getElementById(`input-com-${id}`);
        input.value += emoji;
        input.focus();
        document.getElementById(`emoji-picker-${id}`).classList.remove('show');
    };

    // Fecha emoji picker ao clicar fora
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.comentario-form')) {
            document.querySelectorAll('.emoji-picker').forEach(p => p.classList.remove('show'));
        }
    });

    // ===== COMENTÁRIOS =====
    window.toggleComentarios = async (id) => {
        const wrap = document.getElementById(`coms-${id}`);
        wrap.classList.toggle('show');
        if (wrap.classList.contains('show')) await carregarComentarios(id);
    };

    async function carregarComentarios(resId) {
        const lista = document.getElementById(`lista-coms-${resId}`);
        const q = query(collection(db, 'resenhas', resId, 'comentarios'), orderBy('criadoEm', 'asc'));
        const snap = await getDocs(q);
        lista.innerHTML = snap.docs.map(d => {
            const c = d.data();
            return `<div class="comentario">
                <img class="com-avatar" src="${c.autorAvatar||''}">
                <div><div class="com-nome">${c.autorNome}</div><div class="com-texto">${c.texto}</div></div>
            </div>`;
        }).join('') || '<div style="color:#aaa;font-size:0.85em;padding:8px;">Nenhum comentário ainda.</div>';
    }

    window.comentar = async (resId) => {
        const input = document.getElementById(`input-com-${resId}`);
        const texto = input.value.trim();
        if (!texto) return;
        await addDoc(collection(db, 'resenhas', resId, 'comentarios'), {
            texto,
            autorId:     usuarioAtual.uid,
            autorNome:   usuarioAtual.displayName || 'Anônimo',
            autorAvatar: usuarioAtual.photoURL    || '',
            criadoEm:    serverTimestamp()
        });
        input.value = '';
        await carregarComentarios(resId);
    };

    // ===== BUSCA DE FILME =====
    window.buscarFilme = () => {
        clearTimeout(buscaTimeout);
        const q = document.getElementById('busca-filme').value.trim();
        if (!q) { document.getElementById('busca-resultado').style.display = 'none'; return; }
        buscaTimeout = setTimeout(async () => {
            const res  = await fetch(`${BASE}/search/multi?api_key=${API_KEY}&language=pt-BR&query=${encodeURIComponent(q)}`);
            const data = await res.json();
            const itens = (data.results || []).filter(i => i.media_type !== 'person').slice(0, 6);
            const box = document.getElementById('busca-resultado');
            if (!itens.length) { box.style.display = 'none'; return; }
            box.style.display = 'block';
            box.innerHTML = itens.map(i => `
                <div class="busca-item" onclick='selecionarFilme(${JSON.stringify(i)})'>
                    <img src="${i.poster_path ? 'https://image.tmdb.org/t/p/w92'+i.poster_path : ''}" alt="">
                    <div>
                        <div class="busca-item-titulo">${i.title||i.name}</div>
                        <div class="busca-item-ano">${(i.release_date||i.first_air_date||'').substring(0,4)}</div>
                    </div>
                </div>`).join('');
        }, 400);
    };

    window.selecionarFilme = (item) => {
        filmeSelecionado = item;
        document.getElementById('busca-resultado').style.display = 'none';
        document.getElementById('busca-filme').value = '';
        const sel = document.getElementById('filme-selecionado');
        sel.classList.add('show');
        document.getElementById('filme-sel-poster').src = item.poster_path ? `https://image.tmdb.org/t/p/w92${item.poster_path}` : '';
        document.getElementById('filme-sel-titulo').textContent = item.title || item.name;
        document.getElementById('filme-sel-ano').textContent = (item.release_date||item.first_air_date||'').substring(0,4);
    };

    window.selecionarNota = (n) => {
        notaSelecionada = n;
        document.querySelectorAll('.nota-star').forEach((s, i) => s.classList.toggle('ativo', i < n));
    };

    // ===== PUBLICAR =====
    window.publicarResenha = async () => {
        const texto = document.getElementById('resenha-texto').value.trim();
        if (!filmeSelecionado) { alert('Selecione um filme ou série!'); return; }
        if (!texto) { alert('Escreva sua resenha!'); return; }
        const btn = document.getElementById('btn-publicar');
        btn.disabled = true; btn.textContent = 'Publicando...';
        try {
            await addDoc(collection(db, 'resenhas'), {
                filmeId:     filmeSelecionado.id,
                filmeTitulo: filmeSelecionado.title || filmeSelecionado.name,
                filmePoster: filmeSelecionado.poster_path || '',
                filmeAno:    (filmeSelecionado.release_date || filmeSelecionado.first_air_date || '').substring(0,4),
                tipoFilme:   filmeSelecionado.media_type === 'movie' ? 'filme' : 'serie',
                texto,
                nota:        notaSelecionada,
                autorId:     usuarioAtual.uid,
                autorNome:   usuarioAtual.displayName || 'Anônimo',
                autorAvatar: usuarioAtual.photoURL    || '',
                reacoes:     {},
                criadoEm:    serverTimestamp()
            });
            document.getElementById('resenha-texto').value = '';
            document.getElementById('filme-selecionado').classList.remove('show');
            filmeSelecionado = null; notaSelecionada = 0;
            document.querySelectorAll('.nota-star').forEach(s => s.classList.remove('ativo'));
            await carregarFeed(feedAtual);
        } catch(e) { alert('Erro ao publicar.'); }
        btn.disabled = false; btn.textContent = 'Publicar';
    };

    // ===== SUGESTÕES =====
    async function carregarSugestoes() {
        const lista = document.getElementById('sugestoes-lista');
        try {
            const snap  = await getDocs(query(collection(db, 'usuarios'), limit(5)));
            const outros = snap.docs.filter(d => d.id !== usuarioAtual.uid).slice(0, 4);
            if (!outros.length) { lista.innerHTML = '<div style="color:#aaa;font-size:0.85em;">Nenhum usuário ainda.</div>'; return; }
            lista.innerHTML = outros.map(d => {
                const u = d.data();
                return `<div class="usuario-item">
                    <img class="usuario-avatar" src="${u.avatar||''}" onclick="window.location.href='perfil.html?uid=${d.id}'">
                    <div class="usuario-nome" onclick="window.location.href='perfil.html?uid=${d.id}'">${u.nome||'Anônimo'}</div>
                    <button class="btn-seguir-mini" onclick="seguirUsuario('${d.id}', this)">+ Seguir</button>
                </div>`;
            }).join('');
        } catch(e) { lista.innerHTML = ''; }
    }

    window.seguirUsuario = async (uid, btn) => {
        const ref  = doc(db, 'usuarios', uid);
        const snap = await getDoc(ref);
        const seguidores = snap.data()?.seguidores || [];
        if (!seguidores.includes(usuarioAtual.uid)) {
            seguidores.push(usuarioAtual.uid);
            await updateDoc(ref, { seguidores });
            const meRef  = doc(db, 'usuarios', usuarioAtual.uid);
            const meSnap = await getDoc(meRef);
            const seguindo = meSnap.data()?.seguindo || [];
            if (!seguindo.includes(uid)) { seguindo.push(uid); await updateDoc(meRef, { seguindo }); }
            btn.textContent = '✓ Seguindo';
            btn.style.color = '#2ecc71';
        }
    };

    window.sair = async () => { await signOut(auth); window.location.href = 'login.html'; };
</script>
</body>
</html>
